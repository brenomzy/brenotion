<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title description">
  <title id="title">Exploração visual das jornadas Android principais do Brenotion</title>
  <desc id="description">Três conceitos de tela para início, organização do recebimento e revisão semanal, acompanhados por princípios visuais.</desc>
  <defs>
    <filter id="phone-shadow" x="-30%" y="-20%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#18241A" flood-opacity="0.14"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#18241A" flood-opacity="0.12"/>
    </filter>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#18241A" flood-opacity="0.08"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
      .ink { fill: #18241A; }
      .muted { fill: #4E5C51; }
      .white { fill: #FAF8F5; }
      .title { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; }
      .screen-title { font-size: 25px; font-weight: 700; letter-spacing: -0.02em; }
      .section { font-size: 17px; font-weight: 700; }
      .body { font-size: 14px; font-weight: 500; }
      .label { font-size: 12px; font-weight: 650; }
      .caption { font-size: 11px; font-weight: 520; }
      .amount { font-size: 38px; font-weight: 700; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
      .amount-sm { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
      .tabular { font-variant-numeric: tabular-nums; }
      .product-ui rect { rx: 12px; ry: 12px; }
    </style>
  </defs>

  <rect width="1800" height="1120" fill="#F3EFE7"/>
  <circle cx="1680" cy="110" r="230" fill="#D1EDD9" opacity="0.6"/>
  <circle cx="95" cy="1020" r="230" fill="#D1E2FF" opacity="0.55"/>

  <g class="sans ink">
    <text x="96" y="78" class="label" fill="#FF4D29" letter-spacing="0.09em">EXPLORAÇÃO 01 · ANDROID</text>
    <text x="96" y="124" class="title">Três momentos, uma linguagem financeira</text>
    <text x="96" y="156" class="body muted">Direção “livro calmo”: decisões em primeiro plano, confiança junto ao valor e patrimônios sempre explícitos.</text>
    <rect x="1480" y="72" width="224" height="44" rx="22" fill="#FEFDFB" opacity="0.85"/>
    <circle cx="1505" cy="94" r="5" fill="#FF4D29"/>
    <text x="1520" y="99" class="caption muted">dados inteiramente sintéticos</text>
  </g>

  <!-- Phone 1 -->
  <g transform="translate(96 210)" filter="url(#phone-shadow)">
    <rect width="390" height="820" rx="42" fill="#18241A"/>
    <rect x="10" y="10" width="370" height="800" rx="34" fill="#F9F6F1"/>
    <rect x="146" y="21" width="98" height="24" rx="12" fill="#18241A"/>
    <g transform="translate(31 64)" class="sans ink product-ui">
      <text y="18" class="caption muted">TERÇA, 14 DE JULHO</text>
      <text y="52" class="screen-title">Bom dia</text>
      <circle cx="301" cy="31" r="20" fill="#FEFDFB"/>
      <path d="M294 31h14M301 24v14" stroke="#18241A" stroke-width="2" stroke-linecap="round"/>

      <rect y="76" width="328" height="44" rx="14" fill="#D1EDD9"/>
      <circle cx="18" cy="98" r="6" fill="#21763C"/>
      <text x="32" y="102" class="label">Atualizado há 8 min · confiança alta</text>

      <rect y="136" width="328" height="206" rx="12" fill="#FF4D29"/>
      <text x="22" y="170" class="label ink" opacity="0.82">DISPONÍVEL PARA GASTAR</text>
      <text x="22" y="220" class="amount ink">R$ 4.860</text>
      <text x="22" y="246" class="body ink" opacity="0.88">até o próximo recebimento, em 18 dias</text>
      <line x1="22" y1="270" x2="306" y2="270" stroke="#FAF8F5" stroke-opacity="0.24"/>
      <text x="22" y="296" class="caption ink" opacity="0.78">Recursos pessoais</text>
      <text x="306" y="296" text-anchor="end" class="label ink tabular">R$ 6.120</text>
      <text x="22" y="320" class="caption ink" opacity="0.78">Compromissos e margem</text>
      <text x="306" y="320" text-anchor="end" class="label ink tabular">− R$ 1.260</text>

      <text y="376" class="section">Próxima ação</text>
      <rect y="392" width="328" height="106" rx="20" fill="#FEFDFB" filter="url(#card-shadow)"/>
      <rect x="16" y="410" width="38" height="38" rx="12" fill="#EAC578"/>
      <path d="M28 429h14M35 422v14" stroke="#18241A" stroke-width="2" stroke-linecap="round"/>
      <text x="68" y="423" class="label">Organizar recebimento</text>
      <text x="68" y="444" class="caption muted">R$ 24.800 recebidos ontem</text>
      <text x="68" y="469" class="caption" fill="#FF4D29">Ver Plano Financeiro →</text>

      <text y="534" class="section">Seu ciclo</text>
      <rect y="550" width="157" height="104" rx="20" fill="#FEFDFB" filter="url(#card-shadow)"/>
      <text x="16" y="576" class="caption muted">Obrigações</text>
      <text x="16" y="604" class="amount-sm">3 próximas</text>
      <circle cx="21" cy="630" r="5" fill="#EAC578"/>
      <text x="33" y="634" class="caption muted">1 requer atenção</text>
      <rect x="171" y="550" width="157" height="104" rx="20" fill="#D1E2FF"/>
      <text x="187" y="576" class="caption muted">Protegido</text>
      <text x="187" y="604" class="amount-sm">R$ 18.420</text>
      <text x="187" y="634" class="caption muted">impostos + reservas</text>

      <line y1="704" x2="328" y2="704" stroke="#18241A" stroke-opacity="0.10"/>
      <g transform="translate(0 722)" class="caption">
        <circle cx="35" cy="4" r="15" fill="#FF4D29"/>
        <path d="M29 5l6-6 6 6v7H29z" fill="#FAF8F5"/>
        <text x="35" y="34" text-anchor="middle" fill="#FF4D29">Início</text>
        <text x="119" y="8" text-anchor="middle" class="muted">Plano</text>
        <text x="211" y="8" text-anchor="middle" class="muted">Revisar</text>
        <text x="302" y="8" text-anchor="middle" class="muted">Mais</text>
      </g>
    </g>
  </g>

  <!-- Phone 2 -->
  <g transform="translate(546 210)" filter="url(#phone-shadow)">
    <rect width="390" height="820" rx="42" fill="#18241A"/>
    <rect x="10" y="10" width="370" height="800" rx="34" fill="#F9F6F1"/>
    <rect x="146" y="21" width="98" height="24" rx="12" fill="#18241A"/>
    <g transform="translate(31 64)" class="sans ink product-ui">
      <text y="19" class="caption muted">←  PLANO FINANCEIRO</text>
      <text y="55" class="screen-title">Organizar recebimento</text>
      <text y="80" class="body muted">Recebimento Empresarial · 13 jul</text>

      <rect y="102" width="328" height="112" rx="24" fill="#674E90"/>
      <text x="20" y="132" class="label white" opacity="0.78">EMPRESA</text>
      <text x="20" y="174" class="amount white">R$ 24.800</text>
      <text x="20" y="198" class="caption white" opacity="0.82">confirmado pela Wise Business</text>

      <text y="250" class="section">Separação proposta</text>
      <text x="328" y="250" text-anchor="end" class="caption" fill="#FF4D29">Ver cálculo</text>

      <rect y="270" width="328" height="244" rx="22" fill="#FEFDFB" filter="url(#card-shadow)"/>
      <rect x="14" y="286" width="8" height="42" rx="4" fill="#BE3029"/>
      <text x="36" y="303" class="label">Impostos e obrigações</text>
      <text x="306" y="303" text-anchor="end" class="label tabular">R$ 3.968</text>
      <text x="36" y="322" class="caption muted">Provisão de Obrigações</text>
      <line x1="22" y1="342" x2="306" y2="342" stroke="#18241A" stroke-opacity="0.09"/>

      <rect x="14" y="358" width="8" height="42" rx="4" fill="#2B6399"/>
      <text x="36" y="375" class="label">Pró-labore e INSS</text>
      <text x="306" y="375" text-anchor="end" class="label tabular">R$ 1.684</text>
      <text x="36" y="394" class="caption muted">competência jul/2026</text>
      <line x1="22" y1="414" x2="306" y2="414" stroke="#18241A" stroke-opacity="0.09"/>

      <rect x="14" y="430" width="8" height="42" rx="4" fill="#21763C"/>
      <text x="36" y="447" class="label">Reserva Operacional</text>
      <text x="306" y="447" text-anchor="end" class="label tabular">R$ 2.200</text>
      <text x="36" y="466" class="caption muted">meta: primeiro mês</text>

      <rect y="530" width="328" height="86" rx="20" fill="#D1E2FF"/>
      <text x="18" y="558" class="caption muted">Distribuição Projetada</text>
      <text x="18" y="590" class="amount-sm">R$ 16.948</text>
      <text x="306" y="579" text-anchor="end" class="caption muted">Pessoal →</text>

      <rect y="632" width="328" height="46" rx="10" fill="#FF4D29"/>
      <text x="164" y="661" text-anchor="middle" class="label ink">Ver 4 ações manuais</text>
      <text x="164" y="704" text-anchor="middle" class="caption muted">O Brenotion não movimenta dinheiro.</text>

      <line y1="726" x2="328" y2="726" stroke="#18241A" stroke-opacity="0.10"/>
      <g transform="translate(0 744)" class="caption">
        <text x="35" y="8" text-anchor="middle" class="muted">Início</text>
        <circle cx="119" cy="4" r="15" fill="#FF4D29"/>
        <text x="119" y="34" text-anchor="middle" fill="#FF4D29">Plano</text>
        <text x="211" y="8" text-anchor="middle" class="muted">Revisar</text>
        <text x="302" y="8" text-anchor="middle" class="muted">Mais</text>
      </g>
    </g>
  </g>

  <!-- Phone 3 -->
  <g transform="translate(996 210)" filter="url(#phone-shadow)">
    <rect width="390" height="820" rx="42" fill="#18241A"/>
    <rect x="10" y="10" width="370" height="800" rx="34" fill="#F9F6F1"/>
    <rect x="146" y="21" width="98" height="24" rx="12" fill="#18241A"/>
    <g transform="translate(31 64)" class="sans ink product-ui">
      <text y="19" class="caption muted">REVISÃO SEMANAL · ~5 MIN</text>
      <text y="55" class="screen-title">Três pontos pedem atenção</text>
      <text y="80" class="body muted">O restante do ciclo está seguindo o plano.</text>

      <rect y="104" width="328" height="48" rx="16" fill="#D1EDD9"/>
      <rect x="14" y="118" width="222" height="20" rx="10" fill="#B7DDC2"/>
      <rect x="14" y="118" width="111" height="20" rx="10" fill="#21763C"/>
      <text x="306" y="134" text-anchor="end" class="label">2 de 4</text>

      <text y="190" class="section">Agora</text>
      <rect y="208" width="328" height="142" rx="22" fill="#FEFDFB" filter="url(#card-shadow)"/>
      <rect x="16" y="226" width="40" height="40" rx="12" fill="#EAC578"/>
      <text x="36" y="252" text-anchor="middle" class="amount-sm">2</text>
      <text x="70" y="232" class="label">Compras sem classificação</text>
      <text x="70" y="253" class="caption muted">R$ 320 podem alterar o ritmo do ciclo</text>
      <rect x="70" y="272" width="178" height="42" rx="10" fill="#FF4D29"/>
      <text x="159" y="298" text-anchor="middle" class="label ink">Revisar compras</text>
      <text x="70" y="334" class="caption muted">Sugestões não foram confirmadas.</text>

      <rect y="366" width="328" height="94" rx="20" fill="#FEFDFB" filter="url(#card-shadow)"/>
      <text x="18" y="392" class="caption muted">Ritmo de gastos variáveis</text>
      <text x="18" y="423" class="amount-sm">78% do esperado</text>
      <rect x="18" y="438" width="292" height="8" rx="4" fill="#E7E3DC"/>
      <rect x="18" y="438" width="228" height="8" rx="4" fill="#EAC578"/>

      <rect y="476" width="328" height="104" rx="20" fill="#FEFDFB" filter="url(#card-shadow)"/>
      <circle cx="36" cy="508" r="18" fill="#F6D6CF"/>
      <text x="36" y="514" text-anchor="middle" class="label" fill="#BE3029">!</text>
      <text x="68" y="503" class="label">Energia vence em 2 dias</text>
      <text x="68" y="524" class="caption muted">Pagamento ainda não identificado</text>
      <text x="68" y="552" class="caption" fill="#FF4D29">Abrir obrigação →</text>

      <text y="618" class="section">Depois</text>
      <rect y="634" width="328" height="68" rx="18" fill="#D1E2FF"/>
      <text x="18" y="660" class="label">Reservas preservadas</text>
      <text x="18" y="683" class="caption muted">Sem impacto relevante nesta semana</text>

      <line y1="726" x2="328" y2="726" stroke="#18241A" stroke-opacity="0.10"/>
      <g transform="translate(0 744)" class="caption">
        <text x="35" y="8" text-anchor="middle" class="muted">Início</text>
        <text x="119" y="8" text-anchor="middle" class="muted">Plano</text>
        <circle cx="211" cy="4" r="15" fill="#FF4D29"/>
        <text x="211" y="34" text-anchor="middle" fill="#FF4D29">Revisar</text>
        <text x="302" y="8" text-anchor="middle" class="muted">Mais</text>
      </g>
    </g>
  </g>

  <!-- Notes -->
  <g transform="translate(1450 240)" class="sans ink">
    <text class="section">Regras aplicadas</text>
    <g transform="translate(0 34)">
      <circle cx="10" cy="9" r="7" fill="#FF4D29"/>
      <text x="30" y="14" class="body">decisão antes do saldo</text>
      <circle cx="10" cy="49" r="7" fill="#EAC578"/>
      <text x="30" y="54" class="body">atenção sem alarmismo</text>
      <circle cx="10" cy="89" r="7" fill="#674E90"/>
      <text x="30" y="94" class="body">Empresa rotulada</text>
      <circle cx="10" cy="129" r="7" fill="#2B6399"/>
      <text x="30" y="134" class="body">Pessoal rotulado</text>
      <circle cx="10" cy="169" r="7" fill="#D1E2FF"/>
      <text x="30" y="174" class="body">protegido ≠ disponível</text>
    </g>

    <text y="274" class="section">Tokens visíveis</text>
    <g transform="translate(0 296)">
      <rect width="250" height="64" rx="16" fill="#FEFDFB"/>
      <circle cx="30" cy="32" r="15" fill="#FF4D29"/>
      <text x="56" y="29" class="label">action-primary</text>
      <text x="56" y="47" class="caption muted">#ff4d29 · oklch 0.669 0.220 33.158</text>
      <rect y="78" width="250" height="64" rx="16" fill="#FEFDFB"/>
      <circle cx="30" cy="110" r="15" fill="#674E90"/>
      <text x="56" y="107" class="label">scope-company</text>
      <text x="56" y="125" class="caption muted">rótulo + cor + contexto</text>
      <rect y="156" width="250" height="64" rx="16" fill="#FEFDFB"/>
      <circle cx="30" cy="188" r="15" fill="#EAC578"/>
      <text x="56" y="185" class="label">status-warning</text>
      <text x="56" y="203" class="caption muted">explica o impacto</text>
    </g>

    <rect y="560" width="250" height="174" rx="24" fill="#18241A"/>
    <text x="22" y="592" class="label white">HIPÓTESES ABERTAS</text>
    <text x="22" y="624" class="caption white" opacity="0.82">• card principal ou fluxo?</text>
    <text x="22" y="650" class="caption white" opacity="0.82">• quatro destinos são suficientes?</text>
    <text x="22" y="676" class="caption white" opacity="0.82">• revisão em fila ou etapas?</text>
    <text x="22" y="702" class="caption white" opacity="0.82">• Empresa/Pessoal persistente?</text>
  </g>

  <g class="sans muted">
    <text x="96" y="1082" class="caption">Board vetorial editável · direção exploratória, não especificação de produção · 14 jul 2026</text>
  </g>
</svg>
